<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PM Task Board</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
  :root{
    --navy:#16233b; --navy-2:#22344f; --petrol:#1f6f7a; --petrol-ink:#12525b;
    --peach:#e8945f; --peach-soft:#fbe7d6; --paper:#fff; --pane:#fafafa;
    --line:#e6e4e1; --muted:#70757c; --ink:#1f2733; --ok:#2e7d5b; --warn:#a15a2a;
    --font:'Segoe UI', Inter, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0; font-family:var(--font); color:var(--ink); background:var(--pane);
    -webkit-font-smoothing:antialiased; display:flex; flex-direction:column}
  .bar{display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--navy); color:#fff}
  .logo{width:26px;height:26px;border-radius:6px;background:#fff;color:var(--navy);
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center}
  .bar .t{font-size:13.5px; font-weight:600}
  .bar .s{font-size:11px; color:#b9c4d6; margin-top:1px}
  .dot{margin-left:auto; display:flex; align-items:center; gap:6px; font-size:10.5px; color:#b9c4d6}
  .dot i{width:8px;height:8px;border-radius:50%;background:#7c8598; display:block}
  .dot.up i{background:#4ec38a}
  .dot.down i{background:#e8945f}
  .scroll{flex:1 1 auto; overflow:auto; padding:14px 16px 8px}
  .source{display:flex; gap:10px; padding:10px 12px; border-radius:10px;
    background:var(--peach-soft); border:1px solid #f3d6bf; margin-bottom:16px}
  .source .ic{flex:0 0 auto; width:26px;height:26px;border-radius:6px;background:var(--peach);
    color:#fff; display:flex; align-items:center; justify-content:center}
  .source .lab{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--warn); font-weight:700}
  .source .val{font-size:12.5px; color:#5a3a22; margin-top:2px; line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .field{margin-bottom:14px}
  .field>label{display:block; font-size:11.5px; font-weight:700; color:var(--navy-2); margin-bottom:5px}
  .field .hint{font-size:11px; color:var(--ok); margin-top:4px}
  input[type=text],input[type=number],textarea{width:100%; font-family:var(--font);
    font-size:13.5px; color:var(--ink); background:var(--paper); border:1px solid var(--line);
    border-radius:8px; padding:9px 11px; outline:none; transition:border-color .12s, box-shadow .12s}
  textarea{resize:vertical; min-height:64px; line-height:1.5}
  input:focus,textarea:focus{border-color:var(--petrol); box-shadow:0 0 0 3px rgba(31,111,122,.14)}
  .two{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .rowline{display:flex; align-items:center; gap:8px; margin-top:8px}
  .rowline .lb{font-size:11px; color:var(--muted)}
  .badge{display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:700;
    padding:5px 11px; border-radius:999px; border:1px solid transparent}
  .badge .d{width:7px;height:7px;border-radius:50%}
  .badge.q{background:rgba(31,111,122,.10); color:var(--petrol-ink); border-color:rgba(31,111,122,.25)}
  .badge.q .d{background:var(--petrol)}
  .badge.p{background:var(--peach-soft); color:var(--warn); border-color:#f0cdb2}
  .badge.p .d{background:var(--peach)}
  .badge.o{background:#eceef1; color:#5b6270; border-color:#dfe2e7}
  .badge.o .d{background:#9aa1ac}
  .seg{display:flex; gap:6px; flex-wrap:wrap}
  .seg button{flex:1 1 auto; min-width:64px; font-family:var(--font); font-size:12px; font-weight:600;
    padding:8px 6px; border:1px solid var(--line); border-radius:8px; background:#fff;
    color:var(--navy-2); cursor:pointer; transition:all .12s; line-height:1.15}
  .seg button .wk{display:block; font-size:9.5px; color:var(--muted); margin-top:2px}
  .seg button:hover{border-color:var(--petrol)}
  .seg button.on{background:var(--navy); color:#fff; border-color:var(--navy)}
  .seg button.on .wk{color:#b9c4d6}
  .sub{display:flex; align-items:center; gap:9px; padding:6px 0}
  .sub input[type=checkbox]{width:16px;height:16px; accent-color:var(--petrol)}
  .sub span{font-size:13px}
  .sub.done span{text-decoration:line-through; color:var(--muted)}
  .sub .del{margin-left:auto; border:0; background:transparent; color:#c2c6cc; cursor:pointer; font-size:15px}
  .sub .del:hover{color:#d9534f}
  .addsub{display:flex; gap:8px; margin-top:6px}
  .addsub input{flex:1}
  .addsub button{flex:0 0 auto; width:38px; border:1px dashed var(--line); border-radius:8px;
    background:#fff; color:var(--petrol); font-size:18px; cursor:pointer}
  .addsub button:hover{border-color:var(--petrol); background:rgba(31,111,122,.06)}
  .foot{flex:0 0 auto; display:flex; gap:10px; padding:12px 16px; border-top:1px solid var(--line); background:var(--pane)}
  .btn{font-family:var(--font); font-size:13.5px; font-weight:600; border-radius:8px; padding:10px 14px;
    cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--navy-2)}
  .btn.ghost:hover{background:#f2f4f6}
  .btn.primary{flex:1; border-color:var(--petrol); background:var(--petrol); color:#fff}
  .btn.primary:hover{background:var(--petrol-ink)}
  .btn:disabled{opacity:.55; cursor:default}
  .msg{position:fixed; left:12px; right:12px; bottom:12px; border-radius:10px; padding:11px 14px;
    font-size:12.5px; display:flex; align-items:flex-start; gap:10px; background:var(--navy); color:#fff;
    transform:translateY(20px); opacity:0; pointer-events:none; transition:all .22s}
  .msg.show{transform:translateY(0); opacity:1}
  .msg.warn{background:var(--warn)}
  .msg .ic{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; font-size:12px; flex:0 0 auto}
  .msg small{display:block; opacity:.8; margin-top:2px; font-size:11px; line-height:1.35}
  @media (prefers-reduced-motion:reduce){ *{transition:none !important} }
  :focus-visible{outline:2px solid var(--petrol); outline-offset:1px}
</style>
</head>
<body>
  <div class="bar">
    <span class="logo">PM</span>
    <div><div class="t">PM Task Board</div><div class="s">Add from email &middot; b5-2026-07-14</div></div>
    <span class="dot" id="health" title="Task Board connection"><i></i><span id="healthTxt">checking</span></span>
  </div>

  <div class="scroll">
    <div class="source">
      <span class="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h16v14H4z"/><path d="M4 7l8 6 8-6"/></svg></span>
      <div><div class="lab">From this email</div><div class="val" id="srcVal">Loading…</div></div>
    </div>

    <div class="field">
      <label for="fTitle">Task title</label>
      <input type="text" id="fTitle" placeholder="Title">
    </div>

    <div class="field">
      <label for="fCls">Classification / project</label>
      <input type="text" id="fCls" placeholder="e.g. PC06 PIL-482913" autocomplete="off">
      <div class="rowline"><span class="lb">Row:</span>
        <span class="badge o" id="rowBadge"><span class="d"></span><span id="rowTxt">Other</span></span></div>
    </div>

    <div class="field">
      <label for="fWbs">WBS</label>
      <input type="text" id="fWbs" placeholder="Optional">
    </div>

    <div class="field">
      <label>Column</label>
      <div class="seg" id="seg">
        <button data-b="TODAY">Today Prio<span class="wk" id="segWk"></span></button>
        <button data-b="THIS_WEEK" class="on">This Week</button>
        <button data-b="NEXT_WEEK">Next Week</button>
        <button data-b="PI">PI</button>
        <button data-b="BACKLOG">Backlog</button>
      </div>
    </div>

    <div class="field two">
      <div><label for="fEst">Pomodoro estimate</label><input type="number" id="fEst" min="0" step="1" placeholder="0"></div>
      <div></div>
    </div>

    <div class="field">
      <label>Subtasks</label>
      <div id="subs"></div>
      <div class="addsub"><input type="text" id="subIn" placeholder="Add subtask…"><button id="subAdd" aria-label="Add subtask">+</button></div>
    </div>

    <div class="field">
      <label for="fNotes">Notes</label>
      <textarea id="fNotes" placeholder="Context, links, email reference…"></textarea>
    </div>
  </div>

  <div class="foot">
    <button class="btn ghost" id="btnCopy" title="Copy the card as JSON">Copy</button>
    <button class="btn primary" id="btnAdd">Add to board</button>
  </div>

  <div class="msg" id="msg"><span class="ic" id="msgIc">✓</span>
    <div><b id="msgT">Added</b><small id="msgS"></small></div></div>

<script>
const BUILD = "b5-2026-07-14";
console.log("PM Task Board add-in build:", BUILD);

// A silent JS error once made the Add button do nothing at all.
// Surface every uncaught error where it can actually be seen.
window.addEventListener("error", e => {
  try { flash("Script error", String(e.message || e.error), true); } catch(_) {}
});
window.addEventListener("unhandledrejection", e => {
  try { flash("Script error", String(e.reason && e.reason.message || e.reason), true); } catch(_) {}
});
const HELPER = "http://127.0.0.1:8765";
const TIMEOUT = 1500;
const $ = s => document.querySelector(s);
let bucket = "THIS_WEEK";
let subtasks = [];
let emailId = null;

/* ---------- week code (mirrors the board) ---------- */
function isoWeek(d){
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - day);
  const ys = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return { yy: t.getUTCFullYear() % 100, wk: Math.ceil((((t - ys) / 86400000) + 1) / 7), d: day };
}
function todayCode(){
  const i = isoWeek(new Date());
  return "w" + String(i.yy).padStart(2,"0") + String(i.wk).padStart(2,"0") + "." + i.d;
}
$("#segWk").textContent = todayCode();

/* ---------- classifier (identical rules to the board) ---------- */
const PIL_RE = /^PIL-[A-Za-z0-9]+/i;
function rowFor(cls){
  const s = (cls || "").trim();
  const m = s.match(/^(PC06|PC24)\b/i);
  if (!m) return { id:"OTHER", label:"Other", cls:"o" };
  const vehicle = m[1].toUpperCase();
  const rest = s.slice(m[0].length).trim();
  if (!rest) return { id:"OTHER", label:"Other", cls:"o" };
  if (PIL_RE.test(rest)) return { id:vehicle+"_QUALITY", label:vehicle+" Quality", cls:"q" };
  return { id:vehicle+"_PMR", label:vehicle+" PMR", cls:"p" };
}
function applyClassification(){
  const r = rowFor($("#fCls").value);
  $("#rowBadge").className = "badge " + r.cls;
  $("#rowTxt").textContent = r.label;
}
$("#fCls").addEventListener("input", applyClassification);

/* ---------- bucket ---------- */
$("#seg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  $("#seg").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
  bucket = b.dataset.b;
});

/* ---------- subtasks ---------- */
function renderSubs(){
  const box = $("#subs"); box.innerHTML = "";
  subtasks.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "sub" + (s.done ? " done" : "");
    const cb = document.createElement("input"); cb.type = "checkbox"; cb.checked = s.done;
    cb.addEventListener("change", () => { s.done = !s.done; renderSubs(); });
    const sp = document.createElement("span"); sp.textContent = s.text;
    const del = document.createElement("button"); del.className = "del"; del.textContent = "×";
    del.addEventListener("click", () => { subtasks.splice(i,1); renderSubs(); });
    row.append(cb, sp, del); box.appendChild(row);
  });
}
function addSub(){
  const v = $("#subIn").value.trim(); if (!v) return;
  subtasks.push({ text: v, done: false }); $("#subIn").value = ""; renderSubs(); $("#subIn").focus();
}
$("#subAdd").addEventListener("click", addSub);
$("#subIn").addEventListener("keydown", e => { if (e.key === "Enter"){ e.preventDefault(); addSub(); } });

/* ---------- helper connection ---------- */
async function call(path, opts){
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), TIMEOUT);
  try{
    const res = await fetch(HELPER + path, Object.assign({ signal: ctrl.signal }, opts || {}));
    if (!res.ok) return null;
    return await res.json();
  }catch(e){ return null; }
  finally{ clearTimeout(t); }
}
async function checkHealth(){
  const el = $("#health"), txt = $("#healthTxt");
  const ok = await call("/ping");
  el.className = "dot " + (ok ? "up" : "down");
  txt.textContent = ok ? "bridge connected" : "bridge offline";
  return !!ok;
}

/* ---------- build the card ---------- */
function buildCard(){
  const title = $("#fTitle").value.trim();
  if (!title){ $("#fTitle").focus(); flash("Title is required", "", true); return null; }
  return {
    sourceId: newSourceId(),   // unique per click: one email can spawn many tasks
    emailId,
    title,
    classification: $("#fCls").value.trim(),
    wbs: $("#fWbs").value.trim(),
    bucket,
    pomodoroEstimate: Math.max(0, parseInt($("#fEst").value, 10) || 0),
    subtasks: subtasks.filter(s => s.text.trim()),
    notes: $("#fNotes").value,
  };
}

function flash(title, sub, warn){
  const m = $("#msg");
  $("#msgT").textContent = title;
  $("#msgS").textContent = sub || "";
  $("#msgIc").textContent = warn ? "!" : "✓";
  m.className = "msg show" + (warn ? " warn" : "");
  clearTimeout(flash._t);
  flash._t = setTimeout(() => m.classList.remove("show"), 4000);
}

async function copyCard(card){
  const text = JSON.stringify(card, null, 2);
  try{
    await navigator.clipboard.writeText(text);
    return true;
  }catch(e){
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    let ok = false;
    try{ ok = document.execCommand("copy"); }catch(_){}
    document.body.removeChild(ta);
    return ok;
  }
}

/* ---------- actions ---------- */
$("#btnAdd").addEventListener("click", async () => {
 try {
  const card = buildCard(); if (!card) return;
  const btn = $("#btnAdd");
  btn.disabled = true; btn.textContent = "Sending…";

  const res = await call("/card", {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=UTF-8" },
    body: JSON.stringify(card),
  });

  btn.disabled = false; btn.textContent = "Add to board";

  if (res && res.ok){
    await checkHealth();
    flash("Card queued", "Now click Sync on the Task Board to import it.");
  } else {
    await checkHealth();
    const copied = await copyCard(card);
    flash(
      copied ? "Bridge offline — card copied" : "Bridge offline",
      copied
        ? "Start the board via the .bat, then paste via Import."
        : "Start the board via the .bat launcher and try again."
      , true);
  }
 } catch (err) {
  const btn = $("#btnAdd");
  btn.disabled = false; btn.textContent = "Add to board";
  flash("Failed to add", String(err && err.message || err), true);
  console.error(err);
 }
});

$("#btnCopy").addEventListener("click", async () => {
  const card = buildCard(); if (!card) return;
  const ok = await copyCard(card);
  flash(ok ? "Card copied" : "Copy failed", ok ? "JSON is on the clipboard." : "", !ok);
});

/* ---------- read the selected email ---------- */
function newSourceId(){
  return "card-" + Date.now() + "-" + Math.random().toString(36).slice(2,8);
}

function seed(subject, fromName){
  $("#srcVal").textContent = (fromName ? fromName + " - " : "") + (subject || "(no subject)");
  $("#fTitle").value = (subject || "").replace(/^(RE|FW|FWD|ENC|RES)\s*:\s*/i, "").trim();
  $("#fCls").value = "";
  $("#fNotes").value = fromName ? `From email: ${fromName} - "${subject}"` : "";
  subtasks = []; renderSubs();
  applyClassification();
}

if (window.Office && Office.onReady){
  Office.onReady(() => {
    try{
      const item = Office.context.mailbox.item;
      const from = item.from ? item.from.displayName
                 : (item.organizer ? item.organizer.displayName : "");
      seed(item.subject, from);
      emailId = item.itemId ? String(item.itemId) : null;
    }catch(e){
      $("#srcVal").textContent = "(no email selected)";
    }
    checkHealth();
  });
} else {
  seed("PC06 PIL-482913 Alternator field test", "Field Test Coordination");
  checkHealth();
}
</script>
</body>
</html>
